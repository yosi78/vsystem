    /* ═══════════════════════════════════════════
       EMAIL NOTIFICATIONS (EmailJS)
    ═══════════════════════════════════════════ */
    let _emailSettings = null;

    async function loadEmailSettings() {
      if (_emailSettings) return _emailSettings;
      try {
        const snap = await db.ref('settings').once('value');
        _emailSettings = snap.val() || {};
        if (_emailSettings.emailjsPublicKey && typeof emailjs !== 'undefined') {
          emailjs.init(_emailSettings.emailjsPublicKey);
        }
      } catch (e) {
        _emailSettings = {};
      }
      return _emailSettings;
    }

    async function sendTicketEmail(ticketData) {
      try {
        const s = await loadEmailSettings();
        if (!s.emailjsPublicKey || !s.emailjsServiceId || !s.emailjsTemplateId) return;
        if (typeof emailjs === 'undefined') return;
        await emailjs.send(s.emailjsServiceId, s.emailjsTemplateId, {
          teacher:     ticketData.teacherName,
          location:    ticketData.location,
          description: ticketData.description,
          date:        new Date().toLocaleDateString('he-IL'),
        });
        console.log('✓ Ticket email sent');
      } catch (err) {
        console.error('Email error (non-critical):', err);
      }
    }

    /* ═══════════════════════════════════════════
       STATE / STORE  (Firebase Realtime Database)
    ═══════════════════════════════════════════ */
    const USER_KEY = 'school-user-v1';

    // ממיר ticket מ-Firebase (אובייקט עם מפתחות) למבנה תקין
    function normalizeTicket(id, data) {
      return {
        ...data,
        id,
        executionStatus: data.executionStatus || null,
        closedAt:        data.closedAt        || null,
        image:           data.image           || null,
        notes: data.notes
          ? Object.values(data.notes).sort((a, b) => a.time > b.time ? 1 : -1)
          : [],
      };
    }

    const Ctx = createContext(null);

    function StoreProvider({ children }) {
      const [tickets,     setTickets]     = useState([]);
      const [loading,     setLoading]     = useState(true);
      const [dbError,     setDbError]     = useState('');
      const [currentUser, setCurrentUser] = useState(() => {
        try { return JSON.parse(localStorage.getItem(USER_KEY) || 'null'); }
        catch(e) { return null; }
      });

      // האזנה בזמן אמת לנתוני הטיקטים
      useEffect(() => {
        const ref = db.ref('tickets');
        const handler = ref.on('value', snap => {
          const val = snap.val() || {};
          const list = Object.entries(val)
            .map(([id, data]) => normalizeTicket(id, data))
            .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
          setTickets(list);
          setLoading(false);
          setDbError('');
        }, (err) => {
          console.error('Firebase read error:', err);
          setLoading(false);
          setDbError(
            err.code === 'PERMISSION_DENIED'
              ? 'אין הרשאות גישה למסד הנתונים. יש לעדכן את Firebase Security Rules ל-read/write: true'
              : 'שגיאה בחיבור למסד הנתונים: ' + (err.message || err.code || err)
          );
        });
        return () => ref.off('value', handler);
      }, []);

      const dispatch = (action) => {
        switch (action.type) {

          case 'LOGIN':
            localStorage.setItem(USER_KEY, JSON.stringify(action.payload));
            setCurrentUser(action.payload);
            break;

          case 'LOGOUT':
            localStorage.removeItem(USER_KEY);
            setCurrentUser(null);
            break;

          case 'ADD_TICKET': {
            const id = 'T-' + Date.now();
            const ticketData = {
              id,
              teacherName:     currentUser.name,
              description:     action.payload.description,
              location:        action.payload.location,
              image:           action.payload.image || null,
              priority:        'normal',
              status:          'open',
              executionStatus: null,
              createdAt:       new Date().toISOString(),
              closedAt:        null,
            };
            // מחזיר Promise — מאפשר לממשק לחכות לאישור הכתיבה לפני הצגת הצלחה
            return db.ref('tickets/' + id).set(ticketData)
              .then(() => sendTicketEmail(ticketData));
          }

          case 'SET_PRIORITY':
            db.ref('tickets/' + action.id + '/priority').set(action.priority);
            break;

          case 'UPDATE_EXEC':
            db.ref('tickets/' + action.id + '/executionStatus').set(action.status);
            break;

          case 'ADD_NOTE':
            db.ref('tickets/' + action.id + '/notes').push({
              text:   action.text,
              author: currentUser.name,
              role:   currentUser.role,
              time:   new Date().toISOString(),
            });
            break;

          case 'CLOSE_TICKET':
            db.ref('tickets/' + action.id).update({
              status:   'closed',
              closedAt: new Date().toISOString(),
            });
            break;

          case 'REOPEN_TICKET':
            db.ref('tickets/' + action.id).update({
              status:          'open',
              closedAt:        null,
              executionStatus: null,
              rejectedAt:      null,
              rejectionReason: null,
            });
            break;

          case 'REJECT_TICKET':
            db.ref('tickets/' + action.id).update({
              status:          'rejected',
              rejectedAt:      new Date().toISOString(),
              rejectionReason: action.reason || '',
            });
            break;

          case 'ARCHIVE_TICKET':
            db.ref('tickets/' + action.id).update({
              originalStatus: action.originalStatus,
              status:         'archived',
              archivedAt:     new Date().toISOString(),
            });
            break;
        }
      };

      const state = { tickets, currentUser, loading, dbError };
      return <Ctx.Provider value={{ state, dispatch }}>{children}</Ctx.Provider>;
    }

    const useStore = () => useContext(Ctx);

    /* ═══════════════════════════════════════════
       HELPERS
    ═══════════════════════════════════════════ */
    function fmtDate(iso) {
      if (!iso) return '';
      return new Date(iso).toLocaleDateString('he-IL', {
        day: '2-digit', month: '2-digit', year: 'numeric',
        hour: '2-digit', minute: '2-digit',
      });
    }

    function fmtDateShort(iso) {
      if (!iso) return '';
      return new Date(iso).toLocaleDateString('he-IL', {
        day: '2-digit', month: '2-digit', year: 'numeric',
      });
    }

    async function compressImg(dataURL) {
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          const MAX = 700;
          let w = img.width, h = img.height;
          if (w > MAX || h > MAX) {
            if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
            else       { w = Math.round(w * MAX / h); h = MAX; }
          }
          const c = document.createElement('canvas');
          c.width = w; c.height = h;
          c.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(c.toDataURL('image/jpeg', 0.65));
        };
        img.onerror = () => resolve(dataURL);
        img.src = dataURL;
      });
    }

    /* ═══════════════════════════════════════════
       EXPORT: HELPERS
    ═══════════════════════════════════════════ */

    // מייצר תמונה של גרף Chart.js ומחזיר dataURL
    function makeChartImg(type, data, options, w, h) {
      return new Promise(resolve => {
        const canvas = document.createElement('canvas');
        canvas.width  = w || 380;
        canvas.height = h || 270;
        canvas.style.cssText = 'position:absolute;top:-9999px;left:-9999px;';
        document.body.appendChild(canvas);
        const chart = new Chart(canvas.getContext('2d'), {
          type,
          data,
          options: {
            ...options,
            animation: { duration: 0 },
            responsive: false,
            plugins: {
              ...(options && options.plugins),
              legend: {
                position: 'bottom',
                labels: { font: { family: 'Arial, Tahoma', size: 11 }, boxWidth: 13, padding: 10,
                  ...(options && options.plugins && options.plugins.legend && options.plugins.legend.labels) }
              }
            }
          }
        });
        setTimeout(() => {
          const img = canvas.toDataURL('image/png');
          chart.destroy();
          document.body.removeChild(canvas);
          resolve(img);
        }, 120);
      });
    }

    /* ═══════════════════════════════════════════
       EXPORT: EXCEL
    ═══════════════════════════════════════════ */
    function exportToExcel(tickets, fromDate, toDate) {
      const wb   = XLSX.utils.book_new();
      const from = fromDate ? new Date(fromDate).toLocaleDateString('he-IL') : 'תחילת הזמן';
      const to   = toDate   ? new Date(toDate).toLocaleDateString('he-IL')   : 'היום';

      const open   = tickets.filter(t => t.status === 'open').length;
      const closed = tickets.filter(t => t.status === 'closed').length;
      const urgent = tickets.filter(t => t.priority === 'urgent').length;
      const normal = tickets.filter(t => t.priority === 'normal').length;
      const future = tickets.filter(t => t.priority === 'future').length;

      // גיליון סיכום
      const locMap = {};
      tickets.forEach(t => { locMap[t.location] = (locMap[t.location] || 0) + 1; });
      const topLocs = Object.entries(locMap).sort((a,b) => b[1]-a[1]).slice(0, 10);

      const summaryData = [
        ['דוח תחזוקה ותקלות — בית הספר'],
        [''],
        ['תאריך הפקה:', new Date().toLocaleDateString('he-IL', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' })],
        ['תקופה:', `${from} עד ${to}`],
        [''],
        ['═══ סיכום ═══'],
        ['סה"כ קריאות:',  tickets.length],
        ['פתוחות:',        open],
        ['סגורות:',        closed],
        [''],
        ['═══ חלוקה לפי עדיפות ═══'],
        ['דחוף:',           urgent],
        ['רגיל:',            normal],
        ['בטיפול עתידי:',  future],
        [''],
        ['═══ Top 10 מיקומים ═══'],
        ['מיקום', 'מספר קריאות'],
        ...topLocs.map(([loc, cnt]) => [loc, cnt]),
      ];
      const wsSummary = XLSX.utils.aoa_to_sheet(summaryData);
      wsSummary['!cols'] = [{ wch: 28 }, { wch: 35 }];
      XLSX.utils.book_append_sheet(wb, wsSummary, 'סיכום');

      // גיליון פירוט קריאות
      const headers = [
        'מזהה', 'תאריך דיווח', 'שם מורה', 'מיקום', 'תיאור הבעיה',
        'עדיפות', 'סטטוס ביצוע', 'סטטוס קריאה', 'תאריך סגירה', 'הערות'
      ];
      const rows = tickets.map(t => [
        t.id,
        fmtDate(t.createdAt),
        t.teacherName,
        t.location,
        t.description,
        PRI_LABEL[t.priority],
        t.executionStatus ? EXEC_LABEL[t.executionStatus].replace(' ✅','') : '—',
        t.status === 'closed' ? 'סגור' : 'פתוח',
        t.closedAt ? fmtDate(t.closedAt) : '—',
        t.notes.map(n => `${n.author}: ${n.text}`).join(' | ') || '—',
      ]);
      const wsData = XLSX.utils.aoa_to_sheet([headers, ...rows]);
      wsData['!cols'] = [
        {wch:14},{wch:20},{wch:16},{wch:32},{wch:44},
        {wch:12},{wch:26},{wch:10},{wch:20},{wch:50},
      ];
      XLSX.utils.book_append_sheet(wb, wsData, 'פירוט קריאות');

      const fname = `דוח_תקלות_${from.replace(/\//g,'-')}_${to.replace(/\//g,'-')}.xlsx`;
      XLSX.writeFile(wb, fname);
    }

    /* ═══════════════════════════════════════════
       EXPORT: PDF
    ═══════════════════════════════════════════ */
    async function exportToPDF(tickets, fromDate, toDate) {
      const from = fromDate ? new Date(fromDate).toLocaleDateString('he-IL') : 'תחילת הזמן';
      const to   = toDate   ? new Date(toDate).toLocaleDateString('he-IL')   : 'היום';

      const open   = tickets.filter(t => t.status === 'open').length;
      const closed = tickets.filter(t => t.status === 'closed').length;
      const urgent = tickets.filter(t => t.priority === 'urgent').length;
      const normal = tickets.filter(t => t.priority === 'normal').length;
      const future = tickets.filter(t => t.priority === 'future').length;

      // ─── בניית גרפים ───
      const [imgStatus, imgPriority, imgLoc, imgTrend] = await Promise.all([

        // גרף עוגה: סטטוס
        makeChartImg('doughnut', {
          labels: ['פתוח', 'סגור'],
          datasets: [{ data: [open, closed],
            backgroundColor: ['#f97316','#22c55e'], borderWidth: 3, borderColor: '#fff', hoverOffset: 5 }]

        // גרף עוגה: עדיפות
        makeChartImg('doughnut', {
          labels: ['דחוף','רגיל','בטיפול עתידי'],
          datasets: [{ data: [urgent, normal, future],
            backgroundColor: ['#ef4444','#eab308','#3b82f6'], borderWidth: 3, borderColor: '#fff', hoverOffset: 5 }]
        }),

        // גרף עמודות: מיקומים

          const m = {};
          tickets.forEach(t => { m[t.location] = (m[t.location]||0)+1; });
          const top = Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,8);

            { labels: top.map(([l]) => l.length > 24 ? l.slice(0,24)+'…' : l),
              datasets:[{ data: top.map(([,v])=>v), backgroundColor:'#3b82f6',
                borderRadius:5, label:'קריאות' }]},
            { indexAxis:'y', plugins:{legend:{display:false}},
              scales:{ x:{beginAtZero:true,ticks:{stepSize:1,font:{size:10}}},
                       y:{ticks:{font:{size:9}}}}},
            680, 300);

        // גרף עמודות: מגמה חודשית

      // ─── בניית HTML לדוח ───
      const tableRows = tickets.slice(0, 200).map((t, i) => `

          <td style="padding:5px 7px;border-bottom:1px solid #f0f0f0;font-size:10px;white-space:nowrap">${fmtDateShort(t.createdAt)}</td>
          <td style="padding:5px 7px;border-bottom:1px solid #f0f0f0;font-size:10px">${t.teacherName}</td>
          <td style="padding:5px 7px;border-bottom:1px solid #f0f0f0;font-size:10px">${t.location.length>22?t.location.slice(0,22)+'…':t.location}</td>
          <td style="padding:5px 7px;border-bottom:1px solid #f0f0f0;font-size:10px">${t.description.length>38?t.description.slice(0,38)+'…':t.description}</td>
          <td style="padding:5px 7px;border-bottom:1px solid #f0f0f0;font-size:10px;text-align:center">
            <span style="padding:2px 7px;border-radius:99px;font-size:9px;font-weight:700;
              background:${t.priority==='urgent'?'#fee2e2':t.priority==='normal'?'#fef9c3':'#dbeafe'};
              color:${t.priority==='urgent'?'#991b1b':t.priority==='normal'?'#92400e':'#1e40af'}">
              ${PRI_LABEL[t.priority]}
            </span>
          </td>
          <td style="padding:5px 7px;border-bottom:1px solid #f0f0f0;font-size:10px;text-align:center">

            <div style="flex:1;background:#fef2f2;border:1.5px solid #fecaca;border-radius:12px;padding:14px;text-align:center">

          <!-- גרף מיקומים -->

            <h3 style="margin:0 0 8px;font-size:13px;font-weight:bold;text-align:center;color:#374151">📍 תקלות לפי מיקום — Top 8</h3>
            <img src="${imgLoc}" style="width:100%;display:block"/>
          </div>

          <!-- גרף מגמה -->
          <div style="border:1px solid #e5e7eb;border-radius:12px;padding:14px;margin-bottom:24px">
            <h3 style="margin:0 0 8px;font-size:13px;font-weight:bold;text-align:center;color:#374151">📈 מגמה חודשית — 6 חודשים אחרונים</h3>

            <table style="width:100%;border-collapse:collapse">

                <tr style="background:#dbeafe">

                  <th style="padding:8px 7px;text-align:right;font-size:10px;color:#1e40af;border-bottom:1px solid #bfdbfe">תאריך</th>
                  <th style="padding:8px 7px;text-align:right;font-size:10px;color:#1e40af;border-bottom:1px solid #bfdbfe">מורה</th>
                  <th style="padding:8px 7px;text-align:right;font-size:10px;color:#1e40af;border-bottom:1px solid #bfdbfe">מיקום</th>
                  <th style="padding:8px 7px;text-align:right;font-size:10px;color:#1e40af;border-bottom:1px solid #bfdbfe">תיאור</th>
                  <th style="padding:8px 7px;text-align:center;font-size:10px;color:#1e40af;border-bottom:1px solid #bfdbfe">עדיפות</th>
                  <th style="padding:8px 7px;text-align:center;font-size:10px;color:#1e40af;border-bottom:1px solid #bfdbfe">סטטוס</th>
                  <th style="padding:8px 7px;text-align:right;font-size:10px;color:#1e40af;border-bottom:1px solid #bfdbfe">נסגר</th>
                </tr>
              </thead>
              <tbody>${tableRows}</tbody>
            </table>
          </div>

        </div>`;

      // ─── html2canvas → jsPDF ───
      const canvas = await html2canvas(container.firstElementChild, {
        scale: 1.8,
        useCORS: true,
        allowTaint: true,
        backgroundColor: '#ffffff',
        logging: false,
      });

      const { jsPDF } = window.jspdf;
      const pdf  = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
      const pgW  = pdf.internal.pageSize.getWidth();
      const pgH  = pdf.internal.pageSize.getHeight();
      const imgD = canvas.toDataURL('image/png', 1.0);
      const totH = canvas.height * (pgW / canvas.width);

      let yOff = 0;
      let first = true;
      while (yOff < totH) {
        if (!first) pdf.addPage();
        pdf.addImage(imgD, 'PNG', 0, -yOff, pgW, totH);
        yOff += pgH;
        first = false;
      }

      container.innerHTML = '';
      pdf.save(`דוח_תקלות_${from.replace(/\//g,'-')}_${to.replace(/\//g,'-')}.pdf`);
    }

    function NotesPanel({ ticket }) {
      const { dispatch } = useStore();
      const [text, setText] = useState('');

      const save = () => {
        if (text.trim()) {
          dispatch({ type: 'ADD_NOTE', id: ticket.id, text: text.trim() });
          setText(''); setShow(false);
        }
      };
      return (
        <div>
          {ticket.notes.length > 0 && (
            <div className="mb-3">
              <p className="text-xs font-bold text-gray-500 uppercase mb-2 tracking-wide">הערות</p>
              <div className="space-y-2">
                {ticket.notes.map((n, i) => (
                  <div key={i} className="bg-gray-50 rounded-xl p-3 border border-gray-100">
                    <p className="text-sm text-gray-800">{n.text}</p>
                    <p className="text-xs text-gray-400 mt-1">{n.author} • {fmtDate(n.time)}</p>
                  </div>
                ))}
              </div>
            </div>
          )}
          {ticket.status !== 'closed' && (
            show ? (
              <div className="flex gap-2">
                <input
                  type="text" value={text}
                  onChange={e => setText(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && save()}
                  placeholder="הוסף הערה..."
                  className="flex-1 border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-blue-400"
                />
                <button onClick={save} className="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-xl text-sm font-semibold">שמור</button>
                <button onClick={() => { setShow(false); setText(''); }} className="text-gray-400 hover:text-gray-600 text-xl px-1">×</button>
              </div>
            ) : (
              <button onClick={() => setShow(true)} className="text-sm text-blue-600 hover:text-blue-800 font-medium">

              </button>
            )
          )}

      );
    }

    /* ═══════════════════════════════════════════
       TEACHER VIEW
    ═══════════════════════════════════════════ */
    function TeacherView() {
      const { state, dispatch } = useStore();
      const [desc, setDesc]         = useState('');
      const [location, setLocation] = useState('');
      const [image, setImage]       = useState(null);
      const [preview, setPreview]   = useState(null);
      const [done, setDone]         = useState(false);
      const [uploading, setUp]      = useState(false);
      const [saving,   setSaving]   = useState(false);
      const [saveErr,  setSaveErr]  = useState('');
      const [errs, setErrs]         = useState({});

      const handleImg = async e => {
        const file = e.target.files[0];
        if (!file) return;
        setUp(true);
        const reader = new FileReader();
        reader.onloadend = async () => {
          const c = await compressImg(reader.result);
          setImage(c); setPreview(c); setUp(false);
        };
        reader.readAsDataURL(file);
      };

      const submit = async () => {
        const e = {};
        if (!desc.trim()) e.desc = 'נא לתאר את הבעיה';
        if (!location)    e.loc  = 'נא לבחור מיקום';
        setErrs(e);
        if (Object.keys(e).length) return;
        setSaving(true);
        setSaveErr('');
        try {
          await dispatch({ type: 'ADD_TICKET', payload: { description: desc.trim(), location, image } });
          setDone(true);
        } catch(err) {
          console.error('Save error:', err);
          setSaveErr(
            err.code === 'PERMISSION_DENIED'
              ? '⛔ שגיאה: אין הרשאות כתיבה לבסיס הנתונים. יש לפנות למנהל המערכת לעדכון Firebase Rules.'
              : '❌ שגיאה בשמירת הקריאה — בדוק חיבור לאינטרנט ונסה שוב. (' + (err.message || err.code || '') + ')'
          );
        } finally {
          setSaving(false);
        }
      };

      const reset = () => {
        setDesc(''); setLocation(''); setImage(null); setPreview(null);
        setErrs({}); setDone(false);
      };

      const myOpen = state.tickets.filter(t =>
        t.teacherName === state.currentUser.name && t.status !== 'closed'
      ).length;

      if (done) return (
        <div className="min-h-screen app-bg">
          <Header title="דיווח תקלה" />
          <div className="max-w-sm mx-auto px-4 py-12 text-center">
            <div className="card p-8">
              <div className="text-6xl mb-4">✅</div>
              <h2 className="text-xl font-bold text-green-700 mb-2">הדיווח התקבל!</h2>
              <p className="text-gray-500 text-sm mb-6">
                הקריאה נרשמה במערכת ותועבר לבדיקת המנהל וטיפול אב הבית
              </p>
              <button onClick={reset} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl text-base transition-colors">
                📋 דיווח תקלה נוספת
              </button>
            </div>
          </div>
          <div className="max-w-2xl mx-auto w-full">
            <Footer />
          </div>
        </div>
      );

      return (
        <div className="min-h-screen app-bg">
          <Header title="דיווח תקלה" />
          <div className="max-w-lg mx-auto px-4 py-4">
            {myOpen > 0 && (
              <div className="bg-blue-50 border border-blue-200 rounded-2xl p-3 mb-4 text-sm text-blue-700 font-medium">
                📋 יש לך {myOpen} קריאה/ות פתוחה/ות כרגע
              </div>
            )}
            <div className="card p-5 space-y-5">
              <div>
                <label className="block text-sm font-bold text-gray-700 mb-2">תיאור הבעיה <span className="text-red-500">*</span></label>
                <textarea
                  value={desc}
                  onChange={e => { setDesc(e.target.value); setErrs(p => ({...p, desc: ''})); }}
                  placeholder="תאר את הבעיה (למשל: ברז דולף, נורה שרופה, מזגן לא עובד, דלת שבורה...)"
                  rows={4}
                  className={`w-full border-2 rounded-xl px-4 py-3 resize-none focus:outline-none transition-colors ${
                    errs.desc ? 'border-red-300 bg-red-50' : 'border-gray-200 focus:border-blue-400'
                  }`}
                />
                {errs.desc && <p className="text-red-500 text-xs mt-1">{errs.desc}</p>}
              </div>
              <div>
                <label className="block text-sm font-bold text-gray-700 mb-2">מיקום <span className="text-red-500">*</span></label>
                <input
                  type="text"
                  value={location}
                  onChange={e => { setLocation(e.target.value); setErrs(p => ({...p, loc: ''})); }}
                  placeholder="למשל: בניין א׳ קומה 2 כיתה 204, חדר מורים, אולם ספורט..."
                  className={`w-full border-2 rounded-xl px-4 py-3 focus:outline-none transition-colors ${
                    errs.loc ? 'border-red-300 bg-red-50' : 'border-gray-200 focus:border-blue-400'
                  }`}
                />
                {errs.loc && <p className="text-red-500 text-xs mt-1">{errs.loc}</p>}
              </div>
              <div>
                <label className="block text-sm font-bold text-gray-700 mb-2">
                  צילום תקלה <span className="text-gray-400 font-normal">(אופציונלי)</span>
                </label>
                {preview ? (
                  <div className="relative">
                    <img src={preview} alt="תמונת תקלה" className="w-full h-44 object-cover rounded-xl" />
                    <button
                      onClick={() => { setImage(null); setPreview(null); }}
                      className="absolute top-2 left-2 bg-red-500 hover:bg-red-600 text-white rounded-full w-8 h-8 flex items-center justify-center text-base shadow transition-colors"
                    >×</button>
                  </div>
                ) : (
                  <label className={`flex flex-col items-center justify-center h-32 border-2 border-dashed rounded-xl cursor-pointer transition-colors ${
                    uploading ? 'border-blue-300 bg-blue-50' : 'border-gray-300 hover:border-blue-400 hover:bg-blue-50'
                  }`}>
                    <span className="text-3xl mb-1">{uploading ? '⏳' : '📷'}</span>
                    <span className="text-gray-500 text-sm">{uploading ? 'מעלה תמונה...' : 'לחץ לצילום או בחירת תמונה'}</span>
                    <input type="file" accept="image/*" capture="environment" onChange={handleImg} className="hidden" disabled={uploading} />
                  </label>
                )}
              </div>
              {saveErr && (
                <div className="bg-red-50 border border-red-200 rounded-xl p-3 text-sm text-red-700 font-medium">
                  {saveErr}
                </div>
              )}
              <button
                onClick={submit}
                disabled={saving || uploading}
                className={`w-full font-bold py-4 rounded-xl text-lg shadow-md transition-colors flex items-center justify-center gap-2 ${
                  saving || uploading
                    ? 'bg-blue-300 cursor-not-allowed text-white'
                    : 'bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white'
                }`}
              >
                {saving
                  ? <><span className="spin text-xl">⏳</span> שומר קריאה...</>
                  : <>📤 שלח דיווח</>
                }
              </button>
            </div>
          </div>
          <div className="max-w-lg mx-auto w-full">
            <Footer />
          </div>
        </div>
      );
    }

                        key={k}
                        onClick={() => dispatch({ type: 'SET_PRIORITY', id: ticket.id, priority: k })}
                        className={`flex-1 py-2.5 rounded-xl text-sm font-semibold border-2 transition-all ${
                          ticket.priority === k
                            ? 'bg-gray-800 border-gray-800 text-white shadow-md'
                            : 'border-gray-200 text-gray-600 hover:border-gray-400 bg-white'
                        }`}
                      >{v}</button>
                    ))}
                  </div>
                </div>
              )}
              {isCaretaker && !isClosed && (
                <div>
                  <p className="text-xs font-bold text-gray-500 uppercase mb-2 tracking-wide">עדכון סטטוס ביצוע</p>
                  <div className="space-y-2">
                    {[
                      { id: 'ordered_part',    label: 'הוזמן חלק / ספק חיצוני',  emoji: '📦' },
                      { id: 'waiting_holiday', label: 'ממתין לחופשה / סוף שבוע', emoji: '⏳' },
                      { id: 'done',            label: 'בוצע!',                    emoji: '✅' },
                    ].map(s => (
                      <button
                        key={s.id}
                        onClick={() => dispatch({ type: 'UPDATE_EXEC', id: ticket.id, status: s.id })}
                        className={`w-full py-3 px-4 rounded-xl text-sm font-semibold border-2 flex items-center gap-2 transition-all ${
                          ticket.executionStatus === s.id
                            ? 'bg-gray-800 border-gray-800 text-white shadow'
                            : 'border-gray-200 text-gray-700 hover:border-gray-400 bg-white'
                        }`}
                      >
                        <span className="text-xl">{s.emoji}</span>{s.label}
                      </button>
                    ))}
                  </div>
                </div>
              )}
              {isRejected && ticket.rejectionReason && (
                <div className="bg-red-50 border border-red-100 rounded-xl p-3">
                  <p className="text-red-700 text-sm font-semibold">סיבת דחייה: {ticket.rejectionReason}</p>
                </div>
              )}
              <NotesPanel ticket={ticket} />
              {isManager && ticket.status !== 'archived' && (
                (isClosed || isRejected) ? (
                  <div className="space-y-2">
                    <button
                      onClick={() => dispatch({ type: 'REOPEN_TICKET', id: ticket.id })}
                      className="w-full py-3 rounded-xl font-bold text-sm bg-orange-100 text-orange-700 hover:bg-orange-200 transition-colors border border-orange-200"
                    >🔄 פתח מחדש</button>
                    <button
                      onClick={() => { if(window.confirm('להעביר קריאה זו לארכיון?')) dispatch({ type: 'ARCHIVE_TICKET', id: ticket.id, originalStatus: ticket.status }); }}
                      className="w-full py-3 rounded-xl font-bold text-sm bg-slate-100 text-slate-600 hover:bg-slate-200 transition-colors border border-slate-200"
                    >📦 העבר לארכיון</button>
                  </div>
                ) : rejectMode ? (
                  <div className="space-y-2">
                    <input
                      value={rejectReason}
                      onChange={e => setRejectReason(e.target.value)}
                      placeholder="סיבת דחייה (אופציונלי)..."
                      className="w-full border border-red-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-red-300"
                    />
                    <div className="flex gap-2">
                      <button
                        onClick={() => { dispatch({ type: 'REJECT_TICKET', id: ticket.id, reason: rejectReason }); setRejectMode(false); setRejectReason(''); }}
                        className="flex-1 py-2.5 rounded-xl font-bold text-sm bg-red-600 text-white hover:bg-red-700 transition-colors"
                      >אשר דחייה</button>
                      <button
                        onClick={() => { setRejectMode(false); setRejectReason(''); }}
                        className="flex-1 py-2.5 rounded-xl font-bold text-sm bg-gray-100 text-gray-600 hover:bg-gray-200 transition-colors"
                      >ביטול</button>
                    </div>
                  </div>
                ) : (
                  <div className="space-y-2">
                    <button
                      onClick={() => dispatch({ type: 'CLOSE_TICKET', id: ticket.id })}
                      className="w-full py-3 rounded-xl font-bold text-sm bg-green-600 hover:bg-green-700 text-white shadow transition-colors"
                    >✅ סגור קריאה</button>
                    <button
                      onClick={() => setRejectMode(true)}
                      className="w-full py-3 rounded-xl font-bold text-sm bg-red-50 text-red-700 hover:bg-red-100 transition-colors border border-red-200"
                    >✕ דחה קריאה</button>
                  </div>
                )
              )}
              {isCaretaker && isClosed && (
                <div className="bg-green-50 border border-green-200 rounded-xl p-3 text-center">
                  <p className="text-green-700 font-bold text-sm">✅ נסגר ע"י המנהל</p>
                  <p className="text-green-600 text-xs mt-0.5">{fmtDate(ticket.closedAt)}</p>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    /* ═══════════════════════════════════════════
       REPORT VIEW
    ═══════════════════════════════════════════ */
    function ReportView() {
      const { state }           = useStore();
      const [fromDate, setFrom] = useState('');
      const [toDate,   setTo]   = useState('');
      const [busy,     setBusy] = useState(''); // 'excel' | 'pdf' | ''
      const [msg,      setMsg]  = useState('');

      const filtered = useMemo(() => {
        return state.tickets.filter(t => {
          if (t.status === 'archived') return false;
          const d = new Date(t.createdAt);
          if (fromDate && d < new Date(fromDate + 'T00:00:00')) return false;
          if (toDate   && d > new Date(toDate   + 'T23:59:59')) return false;
          return true;
        });
      }, [state.tickets, fromDate, toDate]);

      const st = useMemo(() => ({
        total:  filtered.length,
        open:   filtered.filter(t => t.status === 'open').length,
        closed: filtered.filter(t => t.status === 'closed').length,
        urgent: filtered.filter(t => t.priority === 'urgent').length,
        normal: filtered.filter(t => t.priority === 'normal').length,
        future: filtered.filter(t => t.priority === 'future').length,
        done:   filtered.filter(t => t.executionStatus === 'done').length,
      }), [filtered]);

      const setPreset = preset => {
        const now = new Date();
        const fmt = d => d.toISOString().split('T')[0];
        if (preset === 'thisMonth') {
          setFrom(fmt(new Date(now.getFullYear(), now.getMonth(), 1)));
          setTo(fmt(now));
        } else if (preset === 'lastMonth') {
          setFrom(fmt(new Date(now.getFullYear(), now.getMonth()-1, 1)));
          setTo(fmt(new Date(now.getFullYear(), now.getMonth(), 0)));
        } else if (preset === 'thisYear') {
          setFrom(fmt(new Date(now.getFullYear(), 0, 1)));
          setTo(fmt(now));
        } else if (preset === 'lastYear') {
          setFrom(fmt(new Date(now.getFullYear()-1, 0, 1)));
          setTo(fmt(new Date(now.getFullYear()-1, 11, 31)));
        } else {
          setFrom(''); setTo('');
        }
      };

      const doExcel = () => {
        setBusy('excel'); setMsg('');
        try {
          exportToExcel(filtered, fromDate, toDate);
          setMsg('✅ קובץ האקסל הורד בהצלחה');
        } catch(e) {
          setMsg('❌ שגיאה: ' + e.message);
        } finally {
          setBusy('');
        }
      };

      const doPDF = async () => {
        setBusy('pdf'); setMsg('');
        try {
          await exportToPDF(filtered, fromDate, toDate);
          setMsg('✅ קובץ ה-PDF הורד בהצלחה');
        } catch(e) {
          setMsg('❌ שגיאה: ' + e.message);
        } finally {
          setBusy('');
        }
      };

      // Top 5 locations for preview
      const locMap = {};
      filtered.forEach(t => { locMap[t.location] = (locMap[t.location]||0)+1; });
      const topLocs = Object.entries(locMap).sort((a,b)=>b[1]-a[1]).slice(0,5);

      return (
        <div className="max-w-2xl mx-auto px-4 py-4">

          {/* בחירת טווח תאריכים */}
          <div className="card p-5 mb-4">
            <h2 className="font-bold text-gray-800 mb-4 flex items-center gap-2">
              <span className="text-xl">📅</span> בחר טווח תאריכים
            </h2>

            {/* קיצורי דרך */}
            <div className="flex flex-wrap gap-2 mb-4">
              {[
                { id: 'all',       label: 'כל הזמן'   },
                { id: 'thisMonth', label: 'חודש זה'    },
                { id: 'lastMonth', label: 'חודש שעבר'  },
                { id: 'thisYear',  label: 'שנה זו'     },
                { id: 'lastYear',  label: 'שנה שעברה'  },
              ].map(p => (
                <button
                  key={p.id}
                  onClick={() => setPreset(p.id)}
                  className="px-3 py-1.5 bg-slate-100 hover:bg-blue-100 text-slate-700 hover:text-blue-700 rounded-xl text-sm font-semibold transition-colors border border-transparent hover:border-blue-200"
                >
                  {p.label}
                </button>
              ))}
            </div>

            <div className="flex gap-3">
              <div className="flex-1">
                <label className="block text-xs font-bold text-gray-600 mb-1.5">מתאריך</label>
                <input
                  type="date" value={fromDate}
                  onChange={e => setFrom(e.target.value)}
                  className="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-blue-400"
                />
              </div>
              <div className="flex-1">
                <label className="block text-xs font-bold text-gray-600 mb-1.5">עד תאריך</label>
                <input
                  type="date" value={toDate}
                  onChange={e => setTo(e.target.value)}
                  className="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-blue-400"
                />
              </div>
            </div>
          </div>

          {/* תצוגה מקדימה */}
          <div className="card p-5 mb-4">
            <h2 className="font-bold text-gray-800 mb-4 flex items-center gap-2">
              <span className="text-xl">📊</span>
              תצוגה מקדימה
              <span className="text-sm font-normal text-gray-400">
                {!fromDate && !toDate ? '(כל הזמן)' : `${fromDate || '…'} עד ${toDate || '…'}`}
              </span>
            </h2>

            {filtered.length === 0 ? (
              <div className="text-center py-8 text-gray-400">
                <p className="text-3xl mb-2">📭</p>
                <p>אין קריאות בטווח הנבחר</p>
              </div>
            ) : (
              <>
                {/* כרטיסי מספרים */}
                <div className="grid grid-cols-4 gap-2 mb-5">
                  {[
                    { val: st.total,  label: 'סה"כ',   color: 'text-blue-600',   bg: 'bg-blue-50'   },
                    { val: st.open,   label: 'פתוחות', color: 'text-orange-500', bg: 'bg-orange-50' },
                    { val: st.closed, label: 'סגורות', color: 'text-green-600',  bg: 'bg-green-50'  },
                    { val: st.urgent, label: 'דחוף',   color: 'text-red-500',    bg: 'bg-red-50'    },
                  ].map(s => (
                    <div key={s.label} className={`${s.bg} rounded-xl p-3 text-center`}>
                      <p className={`text-2xl font-bold ${s.color}`}>{s.val}</p>
                      <p className="text-xs text-gray-500 mt-0.5">{s.label}</p>
                    </div>
                  ))}
                </div>

                {/* פס עדיפויות */}
                {st.total > 0 && (
                  <div className="mb-5">
                    <p className="text-xs font-bold text-gray-500 mb-2">חלוקה לפי עדיפות</p>
                    <div className="flex rounded-full overflow-hidden h-6 gap-0.5 mb-1.5">
                      {st.urgent > 0 && (
                        <div style={{flex: st.urgent}} className="bg-red-400 flex items-center justify-center text-xs text-white font-bold">{st.urgent}</div>
                      )}
                      {st.normal > 0 && (
                        <div style={{flex: st.normal}} className="bg-yellow-400 flex items-center justify-center text-xs text-white font-bold">{st.normal}</div>
                      )}
                      {st.future > 0 && (
                        <div style={{flex: st.future}} className="bg-blue-400 flex items-center justify-center text-xs text-white font-bold">{st.future}</div>
                      )}
                    </div>
                    <div className="flex gap-4 text-xs text-gray-500 flex-wrap">
                      <span><span className="inline-block w-2.5 h-2.5 rounded-full bg-red-400 ml-1"></span>דחוף: {st.urgent} ({st.total?Math.round(st.urgent/st.total*100):0}%)</span>
                      <span><span className="inline-block w-2.5 h-2.5 rounded-full bg-yellow-400 ml-1"></span>רגיל: {st.normal} ({st.total?Math.round(st.normal/st.total*100):0}%)</span>
                      <span><span className="inline-block w-2.5 h-2.5 rounded-full bg-blue-400 ml-1"></span>עתידי: {st.future} ({st.total?Math.round(st.future/st.total*100):0}%)</span>
                    </div>
                  </div>
                )}

                {/* Top מיקומים */}
                {topLocs.length > 0 && (
                  <div>
                    <p className="text-xs font-bold text-gray-500 mb-2">📍 מיקומים עם הכי הרבה תקלות</p>
                    <div className="space-y-1.5">
                      {topLocs.map(([loc, cnt]) => (
                        <div key={loc} className="flex items-center gap-2">
                          <div className="text-xs text-gray-600 w-40 truncate flex-shrink-0" title={loc}>{loc}</div>
                          <div className="flex-1 bg-gray-100 rounded-full h-3 overflow-hidden">
                            <div
                              className="bg-blue-400 h-3 rounded-full transition-all"
                              style={{width: `${Math.round(cnt/topLocs[0][1]*100)}%`}}
                            />
                          </div>
                          <div className="text-xs font-bold text-gray-600 w-5 text-left">{cnt}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </>
            )}
          </div>

          {/* הודעת סטטוס */}
          {msg && (
            <div className={`rounded-xl p-3 mb-4 text-sm font-semibold text-center ${
              msg.startsWith('✅') ? 'bg-green-50 border border-green-200 text-green-700'
                                   : 'bg-red-50 border border-red-200 text-red-700'
            }`}>
              {msg}
            </div>
          )}

          {/* כפתורי ייצוא */}
          <div className="space-y-3">
            <button
              onClick={doExcel}
              disabled={!filtered.length || !!busy}
              className={`w-full py-4 rounded-2xl font-bold text-base flex items-center justify-center gap-3 shadow-md transition-all ${
                !filtered.length || busy
                  ? 'bg-gray-100 text-gray-400 cursor-not-allowed'
                  : 'bg-emerald-600 hover:bg-emerald-700 active:scale-[.98] text-white'
              }`}
            >
              {busy === 'excel'
                ? <><span className="spin text-xl">⏳</span> מייצא לאקסל...</>
                : <><span className="text-2xl">📊</span> ייצוא לאקסל (.xlsx)</>
              }
            </button>

            <button
              onClick={doPDF}
              disabled={!filtered.length || !!busy}
              className={`w-full py-4 rounded-2xl font-bold text-base flex items-center justify-center gap-3 shadow-md transition-all ${
                !filtered.length || busy
                  ? 'bg-gray-100 text-gray-400 cursor-not-allowed'
                  : 'bg-rose-600 hover:bg-rose-700 active:scale-[.98] text-white'
              }`}
            >
              {busy === 'pdf'
                ? <><span className="spin text-xl">⏳</span> מייצר PDF עם גרפים... (עד 10 שנ׳)</>
                : <><span className="text-2xl">📄</span> ייצוא PDF עם אינפוגרפיקה</>
              }
            </button>

            {filtered.length > 0 && (
              <p className="text-center text-xs text-gray-400">
                {filtered.length} קריאות יכללו בדוח
              </p>
            )}
          </div>
        </div>
      );
    }

    /* ═══════════════════════════════════════════
       MANAGER VIEW

    function ArchiveView() {
      const { state } = useStore();
      const [filter, setFilter] = useState('all');

      const archived = state.tickets.filter(t => t.status === 'archived')
        .sort((a, b) => new Date(b.archivedAt || b.closedAt) - new Date(a.archivedAt || a.closedAt));

      const filtered = filter === 'all' ? archived
        : archived.filter(t => t.originalStatus === filter);

      return (
        <div className="max-w-2xl mx-auto px-4 pb-8">
          <div className="card p-3 mt-4 mb-4">
            <div className="flex gap-2">
              {[['all','הכל'], ['closed','שנסגרו'], ['rejected','שנדחו']].map(([id, lbl]) => (
                <button
                  key={id} onClick={() => setFilter(id)}
                  className={`flex-1 py-2 rounded-xl text-sm font-bold transition-colors ${
                    filter === id ? 'bg-slate-700 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'
                  }`}
                >{lbl}</button>
              ))}
            </div>
          </div>

          {filtered.length === 0 ? (
            <div className="card p-10 text-center text-gray-400">
              <p className="text-4xl mb-2">📦</p>
              <p className="font-medium">אין קריאות בארכיון</p>
            </div>
          ) : filtered.map(t => (
            <div key={t.id} className="card mb-3 p-4 opacity-80 border-r-4 border-slate-300">
              <div className="flex items-start justify-between gap-2 mb-2">
                <div className="flex gap-1.5 flex-wrap">
                  <span className={`badge ${t.originalStatus === 'rejected' ? 'bg-red-50 text-red-700 border-red-200' : 'bg-slate-100 text-slate-600 border-slate-300'}`}>
                    {t.originalStatus === 'rejected' ? 'נדחה ✕' : 'סגור ✓'}
                  </span>
                  <span className={`badge ${PRI_BADGE[t.priority]}`}>{PRI_LABEL[t.priority]}</span>
                </div>
                <span className="text-xs text-gray-400">{fmtDate(t.archivedAt)}</span>
              </div>
              <p className="font-semibold text-gray-700 text-sm">{t.description}</p>
              <p className="text-xs text-gray-500 mt-1">📍 {t.location}</p>
              <p className="text-xs text-gray-400 mt-0.5">👤 {t.teacherName} • נפתח: {fmtDateShort(t.createdAt)}</p>
              {t.rejectionReason && (
                <p className="text-xs text-red-600 mt-1 font-medium">סיבת דחייה: {t.rejectionReason}</p>
              )}
            </div>
          ))}
        </div>
      );
    }

    function ManagerView() {

      const closed   = tickets.filter(t => t.status === 'closed');
      const rejected = tickets.filter(t => t.status === 'rejected');
      const urgent   = open.filter(t => t.priority === 'urgent');
      const pending  = open.filter(t => t.executionStatus === 'done');

      const now = new Date();
      const closedThisMonth = closed.filter(t => {
        const d = new Date(t.closedAt);
        return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
      });

      let list = tab === 'open' ? open : tab === 'closed' ? closed : tab === 'rejected' ? rejected : tickets;
      if (priF !== 'all') list = list.filter(t => t.priority === priF);
      if (search.trim()) list = list.filter(t =>
        t.description.includes(search) || t.location.includes(search) || t.teacherName.includes(search)
      );
      list = [...list].sort((a, b) => {
        const o = { urgent: 0, normal: 1, future: 2 };
        if (o[a.priority] !== o[b.priority]) return o[a.priority] - o[b.priority];
        return new Date(b.createdAt) - new Date(a.createdAt);
      });

      return (
        <div className="min-h-screen app-bg">
          <Header title="לוח בקרה — מנהל" />

          {/* ניווט ראשי */}
          <div className="max-w-2xl mx-auto px-4 pt-4">
            <div className="flex gap-2 mb-4 card p-1.5">
              <button
                onClick={() => setMainTab('tickets')}
                className={`flex-1 py-2.5 rounded-xl text-sm font-bold transition-all flex items-center justify-center gap-2 ${
                  mainTab === 'tickets'
                    ? 'bg-blue-600 text-white shadow-md'
                    : 'text-gray-500 hover:text-gray-700 hover:bg-gray-50'
                }`}
              >
                <span>📋</span> ניהול קריאות
              </button>
              <button
                onClick={() => setMainTab('reports')}
                className={`flex-1 py-2.5 rounded-xl text-sm font-bold transition-all flex items-center justify-center gap-2 ${
                  mainTab === 'reports'
                    ? 'bg-indigo-600 text-white shadow-md'
                    : 'text-gray-500 hover:text-gray-700 hover:bg-gray-50'
                }`}
              >
                <span>📊</span> דוחות
              </button>
              <button
                onClick={() => setMainTab('archive')}
                className={`flex-1 py-2.5 rounded-xl text-sm font-bold transition-all flex items-center justify-center gap-2 ${
                  mainTab === 'archive'
                    ? 'bg-slate-600 text-white shadow-md'
                    : 'text-gray-500 hover:text-gray-700 hover:bg-gray-50'
                }`}
              >
                <span>📦</span> ארכיון
              </button>
              <button
                onClick={() => setMainTab('settings')}
                className={`flex-1 py-2.5 rounded-xl text-sm font-bold transition-all flex items-center justify-center gap-2 ${
                  mainTab === 'settings'
                    ? 'bg-green-600 text-white shadow-md'
                    : 'text-gray-500 hover:text-gray-700 hover:bg-gray-50'
                }`}
              >
                <span>🔔</span> הגדרות
              </button>
            </div>
          </div>

          {/* תוכן ראשי */}
          {mainTab === 'settings' ? <SettingsPanel /> : mainTab === 'archive' ? <ArchiveView /> : mainTab === 'reports' ? <ReportView /> : (
            <div className="max-w-2xl mx-auto px-4 pb-4">

              {/* Stats */}
              <div className="grid grid-cols-2 gap-3 mb-4">
                {[
                  { val: open.length,            label: 'קריאות פתוחות', color: 'text-orange-600', bg: 'bg-orange-50',  border: 'border-orange-100', icon: '📋' },
                  { val: urgent.length,           label: 'דחוף',          color: 'text-red-600',    bg: 'bg-red-50',     border: 'border-red-100',    icon: '🚨' },
                  { val: pending.length,          label: 'ממתין לאישורך', color: 'text-emerald-600',bg: 'bg-emerald-50', border: 'border-emerald-100',icon: '✅' },
                  { val: closedThisMonth.length,  label: 'נסגרו החודש',   color: 'text-blue-600',   bg: 'bg-blue-50',    border: 'border-blue-100',   icon: '📅' },
                ].map(s => (
                  <div key={s.label} className={`${s.bg} border ${s.border} rounded-2xl p-4 shadow-sm`}>
                    <div className="flex items-start justify-between">
                      <p className={`stat-num text-3xl font-extrabold ${s.color}`}>{s.val}</p>
                      <span className="text-2xl opacity-70">{s.icon}</span>
                    </div>
                    <p className="text-xs text-gray-500 mt-1.5 font-medium">{s.label}</p>
                  </div>
                ))}
              </div>

                  {state.dbError && (
                <div className="bg-red-50 border border-red-300 rounded-xl p-3 mb-4 text-sm text-red-800 font-semibold">
                  ⚠️ {state.dbError}
                </div>
              )}

              {pending.length > 0 && (
                <div className="bg-green-50 border border-green-300 rounded-xl p-3 mb-4 text-sm text-green-800 font-semibold">
                  ✅ {pending.length} קריאה/ות בוצעו ע"י אב הבית — ממתינות לאישורך וסגירה
                </div>
              )}

              <div className="card px-4 py-3 mb-3">
                <input
                  type="text" value={search}
                  onChange={e => setSearch(e.target.value)}
                  placeholder="🔍 חפש לפי תיאור, מיקום או שם מורה..."
                  className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-blue-400"
                />
              </div>

              <div className="card p-3 mb-4 space-y-2">
                <div className="flex gap-2">
                  {[['open','פתוחות'], ['closed','סגורות'], ['rejected','נדחות'], ['all','הכל']].map(([id, lbl]) => (
                    <button
                      key={id} onClick={() => setTab(id)}
                      className={`flex-1 py-2 rounded-xl text-sm font-bold transition-colors ${
                        tab === id ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'
                      }`}
                    >{lbl}</button>
                  ))}
                </div>
                <div className="flex gap-1.5">
                  {[['all','הכל'], ['urgent','דחוף'], ['normal','רגיל'], ['future','עתידי']].map(([id, lbl]) => (
                    <button
                      key={id} onClick={() => setPriF(id)}
                      className={`flex-1 py-1.5 rounded-lg text-xs font-semibold transition-colors ${
                        priF === id ? 'bg-slate-700 text-white' : 'bg-gray-100 text-gray-600'
                      }`}
                    >{lbl}</button>
                  ))}
                </div>
              </div>

              {list.length === 0 ? (
                <div className="card p-10 text-center text-gray-400">
                  <p className="text-4xl mb-2">📋</p>
                  <p className="font-medium">אין קריאות להצגה</p>
                </div>
              ) : list.map(t => <TicketCard key={t.id} ticket={t} mode="manager" />)}
            </div>
          )}
          <div className="max-w-2xl mx-auto w-full">
            <Footer />
          </div>
        </div>
      );
    }

    /* ═══════════════════════════════════════════
       CARETAKER VIEW
    ═══════════════════════════════════════════ */
    function CaretakerView() {
      const { state } = useStore();
      const [showClosed, setShowClosed] = useState(false);

      const sortByPri = arr => [...arr].sort((a, b) => {
        const o = { urgent: 0, normal: 1, future: 2 };
        if (o[a.priority] !== o[b.priority]) return o[a.priority] - o[b.priority];
        return new Date(b.createdAt) - new Date(a.createdAt);
      });

      const open   = sortByPri(state.tickets.filter(t => t.status === 'open'));
      const closed = state.tickets
        .filter(t => t.status === 'closed')
        .sort((a, b) => new Date(b.closedAt) - new Date(a.closedAt));

      const urgentCount = open.filter(t => t.priority === 'urgent').length;
      const doneCount   = open.filter(t => t.executionStatus === 'done').length;

      return (
        <div className="min-h-screen app-bg">
          <Header title="משימות — אב הבית" />
          <div className="max-w-2xl mx-auto px-4 py-4">
            <div className="grid grid-cols-3 gap-3 mb-4">
              {[
                { val: open.length,   label: 'פתוחות', color: 'text-orange-600', bg: 'bg-orange-50',  border: 'border-orange-100', icon: '📋' },
                { val: urgentCount,   label: 'דחוף',   color: 'text-red-600',    bg: 'bg-red-50',     border: 'border-red-100',    icon: '🚨' },
                { val: doneCount,     label: 'בוצע',   color: 'text-emerald-600',bg: 'bg-emerald-50', border: 'border-emerald-100',icon: '✅' },
              ].map(s => (
                <div key={s.label} className={`${s.bg} border ${s.border} rounded-2xl p-3 shadow-sm text-center`}>
                  <span className="text-xl">{s.icon}</span>
                  <p className={`text-2xl font-extrabold ${s.color} mt-1`}>{s.val}</p>
                  <p className="text-xs text-gray-500 mt-0.5 font-medium">{s.label}</p>
                </div>
              ))}
            </div>
            {urgentCount > 0 && (
              <div className="bg-red-50 border border-red-300 rounded-xl p-3 mb-4 text-sm text-red-800 font-bold">
                🚨 יש {urgentCount} תקלה/ות דחופה/ות — יש לטפל בהן בהקדם!
              </div>
            )}
            {open.length === 0 ? (
              <div className="bg-white rounded-xl p-10 text-center text-gray-400 mb-4">
                <p className="text-4xl mb-2">🎉</p>
                <p className="font-bold text-gray-600">כל המשימות הושלמו!</p>
                <p className="text-sm mt-1">אין קריאות פתוחות כרגע</p>
              </div>
            ) : (
              open.map(t => <TicketCard key={t.id} ticket={t} mode="caretaker" />)
            )}
            {closed.length > 0 && (
              <div>
                <button
                  onClick={() => setShowClosed(!showClosed)}
                  className="w-full card p-3 text-sm text-gray-600 font-semibold flex items-center justify-center gap-2 mb-3 hover:bg-slate-50 transition-colors"
                >
                  {showClosed ? '▲' : '▼'} קריאות שנסגרו ({closed.length})
                </button>
                {showClosed && closed.map(t => <TicketCard key={t.id} ticket={t} mode="caretaker" />)}
              </div>
            )}
          </div>
          <div className="max-w-2xl mx-auto w-full">
            <Footer />
          </div>
        </div>
      );
    }

    /* ═══════════════════════════════════════════
       LOGIN
    ═══════════════════════════════════════════ */
    const PASSWORDS = { manager: 'g0987', caretaker: 'm0987' };
    const ROLE_DEFAULT_NAME = { manager: 'מנהל', caretaker: 'אב הבית' };

    function Login() {
      const { dispatch } = useStore();
      const [role,     setRole]  = useState('');
      const [name,     setName]  = useState('');
      const [password, setPass]  = useState('');
      const [showPass, setShow]  = useState(false);
      const [err,      setErr]   = useState('');

      const roles = [
        { id: 'teacher',   label: 'מורה',    desc: 'דיווח תקלות',    icon: '📚', bg: 'bg-blue-50 border-blue-200',     sel: 'bg-blue-100 border-blue-500 ring-2 ring-blue-300'     },
        { id: 'manager',   label: 'מנהל',    desc: 'בקרה ותיעוד',   icon: '👔', bg: 'bg-purple-50 border-purple-200', sel: 'bg-purple-100 border-purple-500 ring-2 ring-purple-300' },
        { id: 'caretaker', label: 'אב הבית', desc: 'ביצוע תיקונים', icon: '🔧', bg: 'bg-green-50 border-green-200',   sel: 'bg-green-100 border-green-500 ring-2 ring-green-300'   },
      ];

      const selectRole = r => { setRole(r); setErr(''); setName(''); setPass(''); };

      const go = () => {
        if (!role) { setErr('נא לבחור תפקיד'); return; }
        if (role === 'teacher') {
          if (!name.trim()) { setErr('נא להזין שם מלא'); return; }
          dispatch({ type: 'LOGIN', payload: { name: name.trim(), role } });
        } else {
          if (!password) { setErr('נא להזין סיסמה'); return; }
          if (password !== PASSWORDS[role]) { setErr('סיסמה שגויה'); setPass(''); return; }
          dispatch({ type: 'LOGIN', payload: { name: ROLE_DEFAULT_NAME[role], role } });
        }
      };

      const needsPassword = role === 'manager' || role === 'caretaker';

      return (
        <div className="min-h-screen flex flex-col items-center justify-center px-4 py-8"
          style={{background:'linear-gradient(160deg,#1e3a8a 0%,#2d3a9e 40%,#4c1d95 100%)'}}>

          {/* כרטיס ממורכז */}
          <div className="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden">

            {/* כותרת */}
            <div className="text-center px-8 pt-10 pb-7"
              style={{background:'linear-gradient(160deg,#1e3a8a 0%,#4c1d95 100%)'}}>
              <div className="text-6xl mb-3">🏫</div>
              <h1 className="text-2xl font-extrabold text-white mb-1">מערכת ניהול תקלות</h1>
              <p className="text-blue-200 text-base">בית הספר "שבילים"</p>
              <p className="text-blue-300/60 text-xs mt-1">גרסה 0.3</p>
            </div>

            {/* גוף הטופס */}
            <div className="px-7 py-7">
              <p className="text-xs font-bold text-gray-400 mb-3 tracking-wider uppercase">בחר תפקיד</p>
              <div className="flex flex-col gap-3 mb-6">
                {roles.map(r => (
                  <button
                    key={r.id}
                    onClick={() => selectRole(r.id)}
                    className={`flex items-center gap-4 px-5 py-4 rounded-2xl border-2 transition-all w-full text-right ${role === r.id ? r.sel : r.bg}`}
                  >
                    <span className="text-4xl">{r.icon}</span>
                    <div className="flex-1">
                      <div className="font-bold text-base text-gray-800">{r.label}</div>
                      <div className="text-gray-400 text-sm">{r.desc}</div>
                    </div>
                    {role === r.id && <span className="text-blue-600 font-bold text-lg">✓</span>}
                  </button>
                ))}
              </div>

              {role === 'teacher' && (
                <div className="mb-4">
                  <label className="block text-sm font-bold text-gray-700 mb-1.5">שם מלא</label>
                  <input
                    type="text" value={name}
                    onChange={e => { setName(e.target.value); setErr(''); }}
                    onKeyDown={e => e.key === 'Enter' && go()}
                    placeholder="הזן את שמך המלא"
                    autoFocus
                    className="w-full border-2 border-gray-200 rounded-xl px-4 py-3.5 text-base focus:border-blue-500 focus:outline-none transition-colors"
                  />
                </div>
              )}

              {needsPassword && (
                <div className="mb-4">
                  <label className="block text-sm font-bold text-gray-700 mb-1.5">סיסמה</label>
                  <div className="relative">
                    <input
                      type={showPass ? 'text' : 'password'}
                      value={password}
                      onChange={e => { setPass(e.target.value); setErr(''); }}
                      onKeyDown={e => e.key === 'Enter' && go()}
                      placeholder="הזן סיסמה"
                      autoFocus
                      className="w-full border-2 border-gray-200 rounded-xl px-4 py-3.5 text-base focus:border-blue-500 focus:outline-none transition-colors pl-12"
                    />
                    <button type="button" onClick={() => setShow(!showPass)}
                      className="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 text-xl">
                      {showPass ? '🙈' : '👁'}
                    </button>
                  </div>
                </div>
              )}

              {err && (
                <div className="bg-red-50 border border-red-200 rounded-xl px-4 py-2.5 mb-4 text-red-700 text-sm font-medium text-center">
                  {err}
                </div>
              )}

              <button
                onClick={go} disabled={!role}
                className={`w-full font-bold py-4 rounded-2xl text-lg transition-all ${
                  role
                    ? 'text-white active:scale-[.98]'
                    : 'bg-gray-100 text-gray-400 cursor-not-allowed'
                }`}
                style={role ? {background:'linear-gradient(135deg,#2563eb,#7c3aed)'} : {}}
              >
                {role ? `כניסה כ${ROLE_LABEL[role]}` : 'כניסה למערכת'}
              </button>
            </div>

            <Footer />
          </div>
        </div>
      );
    }

    /* ═══════════════════════════════════════════
       LOADING SCREEN
    ═══════════════════════════════════════════ */
    function LoadingScreen() {
      return (
        <div className="min-h-screen flex items-center justify-center" style={{background:'linear-gradient(135deg,#1e3a8a 0%,#312e81 60%,#4c1d95 100%)'}}>
          <div className="text-center text-white">
            <div className="text-7xl mb-5">🏫</div>
            <p className="text-2xl font-bold mb-1">מערכת ניהול תקלות</p>
            <p className="text-sm opacity-60 mb-8">בית הספר "שבילים"</p>
            <div className="flex items-center justify-center gap-3 bg-white/10 backdrop-blur-sm rounded-2xl px-6 py-3">
              <span className="spin text-2xl">⏳</span>
              <span className="text-sm font-medium">מתחבר למסד הנתונים...</span>
            </div>
          </div>
        </div>
      );
    }

    /* ═══════════════════════════════════════════
       APP ROOT
    ═══════════════════════════════════════════ */
    function Footer() {
      return (
        <footer style={{ background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)' }}
          className="w-full text-center py-4 block">
          <a
            href="mailto:yosiel3@gmail.com?subject=בנוגע למערכת ניהול תקלות&body=שלום יוסי,"
            className="font-bold text-sm inline-block transition-all"
            style={{ color: '#ecf0f1', textDecoration: 'none' }}
            onMouseEnter={e => e.target.style.color = '#93c5fd'}
            onMouseLeave={e => e.target.style.color = '#ecf0f1'}
          >ByteLogicx</a>
          <div className="text-xs mt-1" style={{ color: '#bdc3c7', opacity: 0.8 }}>© 2025 כל הזכויות שמורות</div>
        </footer>
      );
    }

    function App() {
      const { state } = useStore();
      if (state.loading) return <LoadingScreen />;
      if (state.dbError && !state.currentUser) return (
        <div className="min-h-screen bg-gradient-to-br from-red-600 to-red-800 flex items-center justify-center px-4">
          <div className="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full text-center">
            <div className="text-5xl mb-4">⚠️</div>
            <h2 className="text-xl font-bold text-red-700 mb-3">שגיאת חיבור למסד הנתונים</h2>
            <p className="text-gray-600 text-sm mb-5 leading-relaxed">{state.dbError}</p>
            <div className="bg-amber-50 border border-amber-200 rounded-xl p-4 text-right text-sm text-amber-800 leading-relaxed mb-5">
              <p className="font-bold mb-2">⚙️ תיקון מהיר — Firebase Console:</p>
              <ol className="list-decimal pr-4 space-y-1">
                <li>היכנס ל-Firebase Console → Realtime Database</li>
                <li>לחץ על "Rules"</li>
                <li>שנה ל: <code className="bg-amber-100 px-1 rounded">".read": true, ".write": true</code></li>
                <li>לחץ "Publish"</li>
              </ol>
            </div>
            <button onClick={() => window.location.reload()} className="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-xl transition-colors">
              🔄 נסה שוב
            </button>
          </div>
        </div>
      );
      if (!state.currentUser)   return <Login />;
      const { role } = state.currentUser;
      if (role === 'teacher')   return <TeacherView />;
      if (role === 'manager')   return <ManagerView />;
      if (role === 'caretaker') return <CaretakerView />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(
      <StoreProvider><App /></StoreProvider>
    );
  </script>
</body>
</html>
