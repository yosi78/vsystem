<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🗺️ מפת ההפתעות של פורים</title>
  <style>
    :root { --gold:#F59E0B; --dgold:#D97706; --red-z:#F87171; --grn-z:#34D399; --yel-z:#FBBF24; }
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Segoe UI',Arial,sans-serif; min-height:100vh;
      background:radial-gradient(ellipse at top,#0F172A 0%,#1E1B4B 45%,#07050E 100%);
      direction:rtl; color:#fff; overflow-x:hidden; }
    button { cursor:pointer; font-family:inherit; }

    /* ===== SCREENS ===== */
    .screen { display:none; }
    #pick-screen.active    { display:flex; }
    #wait-screen.active    { display:flex; }
    #game-screen.active    { display:flex; }
    #gameover-screen.active{ display:block; }

    /* ===== PICK SCREEN ===== */
    #pick-screen {
      min-height:100vh; align-items:center; justify-content:center;
      flex-direction:column; padding:30px 20px; text-align:center;
    }
    .pick-title { font-size:clamp(1.8rem,5vw,2.8rem); font-weight:900; color:var(--gold);
      text-shadow:0 0 24px rgba(245,158,11,.45); margin-bottom:8px; }
    .pick-sub   { font-size:1.1rem; color:#C4B5FD; margin-bottom:32px; }
    .pick-btns  { display:flex; flex-wrap:wrap; gap:14px; justify-content:center; max-width:680px; }
    .pick-btn {
      padding:14px 24px; border-radius:16px; font-size:1.1rem; font-weight:700;
      border:2px solid transparent; transition:.18s; min-width:120px;
    }
    .pick-btn:hover { transform:scale(1.07); }
    .pick-A     { background:linear-gradient(145deg,#991B1B,#7F1D1D); border-color:var(--red-z); color:#FCA5A5; }
    .pick-A:hover { box-shadow:0 4px 18px rgba(248,113,113,.55); }
    .pick-B     { background:linear-gradient(145deg,#065F46,#064E3B); border-color:var(--grn-z); color:#6EE7B7; }
    .pick-B:hover { box-shadow:0 4px 18px rgba(52,211,153,.55); }
    .pick-mixed { background:linear-gradient(145deg,#92400E,#78350F); border-color:var(--yel-z); color:#FDE68A; }
    .pick-mixed:hover { box-shadow:0 4px 18px rgba(251,191,36,.55); }
    #pick-error { color:#FCA5A5; font-size:1rem; margin-top:20px; }

    /* ===== WAIT SCREEN ===== */
    #wait-screen {
      min-height:100vh; align-items:center; justify-content:center;
      flex-direction:column; text-align:center; padding:30px;
    }
    .wait-ic    { font-size:4rem; margin-bottom:16px; }
    .wait-title { font-size:1.5rem; font-weight:700; color:#A5B4FC; margin-bottom:10px; }
    .wait-sub   { font-size:1rem; color:#6B7280; }

    /* ===== GAME SCREEN ===== */
    #game-screen { height:100vh; flex-direction:column; padding:10px 12px 12px; gap:10px; }

    .gm-header { text-align:center; flex-shrink:0; }
    .gm-title  { font-size:clamp(.95rem,2.5vw,1.4rem); font-weight:900; color:var(--gold);
      text-shadow:0 0 14px rgba(245,158,11,.4); }
    .gm-meta   { display:flex; align-items:center; justify-content:center; flex-wrap:wrap; gap:10px; margin-top:7px; }

    .player-badge { display:inline-flex; align-items:center; gap:8px;
      background:rgba(255,255,255,.1); border:2.5px solid var(--gold);
      border-radius:12px; padding:6px 18px; }
    .player-lbl  { color:#C4B5FD; font-size:.9rem; }
    .player-name { color:var(--gold); font-size:clamp(1.1rem,2.5vw,1.55rem); font-weight:800; }

    .zone-tag { padding:4px 12px; border-radius:20px; font-size:.82rem; font-weight:700; }
    .zt-A     { background:rgba(159,18,18,.4); border:1px solid var(--red-z); color:#FCA5A5; }
    .zt-B     { background:rgba(6,78,59,.4);   border:1px solid var(--grn-z); color:#6EE7B7; }
    .zt-mixed { background:rgba(120,53,15,.4); border:1px solid var(--yel-z); color:#FDE68A; }

    .allowed-wrap { display:flex; align-items:center; gap:6px; flex-wrap:wrap;
      background:rgba(255,255,255,.07); border-radius:10px; padding:5px 12px;
      font-size:.82rem; color:#A5B4FC; }
    .pil-badge { padding:3px 10px; border-radius:8px; font-size:.82rem; font-weight:700; border:1px solid transparent; }
    .pb-A     { background:rgba(159,18,18,.4); border-color:var(--red-z); color:#FCA5A5; }
    .pb-B     { background:rgba(6,78,59,.4);   border-color:var(--grn-z); color:#6EE7B7; }
    .pb-mixed { background:rgba(120,53,15,.4); border-color:var(--yel-z); color:#FDE68A; }

    .my-badge { padding:4px 12px; background:rgba(165,180,252,.15);
      border:1px solid rgba(165,180,252,.35); border-radius:20px;
      font-size:.8rem; color:#A5B4FC; }
    .phase-hint { margin-top:5px; font-size:clamp(.78rem,1.8vw,.9rem); color:#A5B4FC; font-weight:600; }

    /* boards */
    .boards-wrap { display:flex; gap:12px; flex:1; overflow:hidden; }
    .task-board {
      flex:3; background:rgba(255,255,255,.06); border:1.5px solid rgba(255,255,255,.1);
      border-radius:18px; padding:10px; display:flex; flex-direction:column; min-height:0;
    }
    .board-lbl { text-align:center; font-size:clamp(.8rem,1.8vw,.95rem); font-weight:700;
      margin-bottom:8px; padding-bottom:7px; border-bottom:1px solid rgba(255,255,255,.1); flex-shrink:0; }
    .lbl-tasks { color:#FCA5A5; }
    .lbl-names { color:#86EFAC; }
    .task-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:7px; flex:1; min-height:0; }

    .t-sq { border-radius:12px; background:linear-gradient(145deg,#6D28D9,#5B21B6);
      border:2.5px solid #8B5CF6; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      transition:transform .18s,opacity .35s,box-shadow .18s;
      position:relative; overflow:hidden; min-height:0; }
    .t-sq::after { content:''; position:absolute; inset:0; background:transparent; transition:.18s; }
    .t-sq.can-pick { cursor:pointer; }
    .t-sq.can-pick:hover::after { background:rgba(255,255,255,.08); }
    .t-sq.can-pick:hover { transform:scale(1.07); box-shadow:0 5px 18px rgba(139,92,246,.65); }
    .t-sq.no-pick { cursor:default; opacity:.42; }
    .t-sq.gone    { opacity:0!important; pointer-events:none; }
    .sq-num { font-size:clamp(.55rem,1vw,.72rem); color:#C4B5FD; font-weight:700;
      position:absolute; top:4px; right:6px; }
    .sq-e   { font-size:clamp(1.3rem,2.4vw,2.2rem); line-height:1; }

    .names-board { flex:2; background:rgba(255,255,255,.06); border:1.5px solid rgba(255,255,255,.1);
      border-radius:18px; padding:10px; display:flex; flex-direction:column;
      gap:10px; min-height:0; overflow-y:auto; }
    .names-board::-webkit-scrollbar { width:4px; }
    .names-board::-webkit-scrollbar-thumb { background:rgba(255,255,255,.2); border-radius:4px; }

    .pile-group { transition:opacity .3s; }
    .pile-off   { opacity:.28; pointer-events:none; }
    .pile-on    { opacity:1; }
    .pile-header { font-size:clamp(.8rem,1.6vw,.92rem); font-weight:700;
      padding:6px 12px; border-radius:10px; margin-bottom:7px;
      display:flex; align-items:center; gap:6px; border:1.5px solid transparent; }
    .ph-A     { background:rgba(159,18,18,.4); border-color:var(--red-z); color:#FCA5A5; }
    .ph-B     { background:rgba(6,78,59,.4);   border-color:var(--grn-z); color:#6EE7B7; }
    .ph-mixed { background:rgba(120,53,15,.4); border-color:var(--yel-z); color:#FDE68A; }
    .pile-on .pile-header { animation:pileGlow 1.8s ease-in-out infinite; }
    @keyframes pileGlow {
      0%,100% { box-shadow:0 0 0px transparent; }
      50%      { box-shadow:0 0 14px var(--glow-color,rgba(255,255,255,.3)); }
    }
    .ph-A     { --glow-color:rgba(248,113,113,.5); }
    .ph-B     { --glow-color:rgba(52,211,153,.5);  }
    .ph-mixed { --glow-color:rgba(251,191,36,.5);  }
    .pile-cards { display:flex; flex-wrap:wrap; gap:7px; }

    .n-card { width:clamp(52px,7.5vw,80px); aspect-ratio:1; border-radius:10px;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      transition:transform .18s,opacity .35s,box-shadow .18s; border:2px solid transparent; }
    .n-card-A     { background:linear-gradient(145deg,#991B1B,#7F1D1D); border-color:var(--red-z); }
    .n-card-B     { background:linear-gradient(145deg,#065F46,#064E3B); border-color:var(--grn-z); }
    .n-card-mixed { background:linear-gradient(145deg,#92400E,#78350F); border-color:var(--yel-z); }
    .n-card.pickable:hover { transform:scale(1.12); cursor:pointer; }
    .n-card-A.pickable:hover     { box-shadow:0 4px 16px rgba(248,113,113,.6); }
    .n-card-B.pickable:hover     { box-shadow:0 4px 16px rgba(52,211,153,.6); }
    .n-card-mixed.pickable:hover { box-shadow:0 4px 16px rgba(251,191,36,.6); }
    .n-card.gone { opacity:0!important; pointer-events:none; }
    .card-e { font-size:clamp(1rem,2vw,1.5rem); line-height:1; }
    .card-n { font-size:clamp(.65rem,1.2vw,.85rem); font-weight:700; color:rgba(255,255,255,.8); margin-top:2px; }

    /* ===== GAMEOVER ===== */
    #gameover-screen { max-width:740px; margin:0 auto; padding:44px 20px; text-align:center; }
    .go-title { font-size:clamp(2rem,6vw,3.4rem); font-weight:900; color:var(--gold); text-shadow:0 0 24px rgba(245,158,11,.55); }
    .go-sub   { font-size:1.25rem; color:#C4B5FD; margin:10px 0 28px; }
    .sum-panel { background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.15);
      border-radius:20px; padding:20px; margin-bottom:28px; text-align:right; }
    .sum-panel h3 { text-align:center; color:var(--gold); font-size:1.1rem;
      margin-bottom:14px; padding-bottom:10px; border-bottom:1px solid rgba(255,255,255,.12); }
    .sum-row { display:flex; align-items:center; gap:7px; padding:8px 4px;
      border-bottom:1px solid rgba(255,255,255,.07); font-size:.95rem; }
    .sum-row:last-child { border-bottom:none; }
    .sr-badge { padding:2px 8px; border-radius:8px; font-size:.78rem; font-weight:700; flex-shrink:0; }
    .sr-badge-A     { background:rgba(159,18,18,.4); border:1px solid var(--red-z); color:#FCA5A5; }
    .sr-badge-B     { background:rgba(6,78,59,.4);   border:1px solid var(--grn-z); color:#6EE7B7; }
    .sr-badge-mixed { background:rgba(120,53,15,.4); border:1px solid var(--yel-z); color:#FDE68A; }
    .sr-frm { font-weight:700; }
    .sr-arr { color:var(--gold); font-size:.85rem; flex-shrink:0; }
    .sr-to  { font-weight:700; color:#4ADE80; }

    /* ===== MODALS ===== */
    .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.85);
      display:none; align-items:center; justify-content:center; z-index:200; }
    .modal-bg.open { display:flex; animation:fadeIn .25s ease; }
    .modal-box { background:linear-gradient(145deg,#2D1B5A,#1A2A4A);
      border:3px solid var(--gold); border-radius:28px;
      padding:34px 28px 28px; max-width:500px; width:92%;
      text-align:center; animation:popIn .35s cubic-bezier(.34,1.56,.64,1);
      box-shadow:0 28px 80px rgba(0,0,0,.55); }
    .m-big-ic { font-size:clamp(2.8rem,7vw,4.8rem); display:block; margin-bottom:10px; animation:bounceIn .5s ease; }
    .m-head   { font-size:1.45rem; font-weight:800; color:var(--gold); margin-bottom:12px; }
    .m-num    { font-size:.9rem; color:#A5B4FC; margin-bottom:8px; }
    .m-task-txt { background:rgba(255,255,255,.08); border-radius:14px;
      padding:14px 18px; font-size:clamp(1rem,2.4vw,1.15rem);
      line-height:1.65; color:#EDE9FE; margin-bottom:22px; }
    .m-name     { font-size:clamp(1.8rem,5.5vw,3.5rem); font-weight:900; color:#4ADE80;
      margin:10px 0 4px; text-shadow:0 2px 12px rgba(0,0,0,.35); }
    .m-zone-tag { display:inline-block; padding:4px 14px; border-radius:20px;
      font-size:.9rem; font-weight:700; margin-bottom:12px; }
    .mzt-A     { background:rgba(159,18,18,.4); border:1px solid var(--red-z); color:#FCA5A5; }
    .mzt-B     { background:rgba(6,78,59,.4);   border:1px solid var(--grn-z); color:#6EE7B7; }
    .mzt-mixed { background:rgba(120,53,15,.4); border:1px solid var(--yel-z); color:#FDE68A; }
    .m-announce { font-size:1.02rem; color:#FDE68A; line-height:1.75; margin-bottom:22px; font-style:italic; white-space:pre-line; }
    .m-next { display:none; margin-bottom:18px; background:rgba(165,180,252,.12);
      border:1px solid rgba(165,180,252,.35); border-radius:10px;
      padding:8px 16px; font-size:.95rem; color:#A5B4FC; font-weight:600; }
    .m-btn { padding:12px 28px; border-radius:12px; font-size:1.1rem; font-weight:700; border:none; transition:.15s; }
    .btn-grn  { background:linear-gradient(135deg,#059669,#047857); color:#fff; }
    .btn-gold { background:linear-gradient(135deg,var(--gold),var(--dgold)); color:#1C0800; }
    .m-btn:hover { transform:translateY(-2px); box-shadow:0 6px 18px rgba(0,0,0,.4); }

    @keyframes fadeIn   { from{opacity:0} to{opacity:1} }
    @keyframes popIn    { from{transform:scale(.65);opacity:0} to{transform:scale(1);opacity:1} }
    @keyframes bounceIn { 0%{transform:scale(0)} 65%{transform:scale(1.2)} 100%{transform:scale(1)} }
    @keyframes cfDrop   { 0%{transform:translateY(0) rotate(0);opacity:1} 100%{transform:translateY(110vh) rotate(700deg);opacity:0} }

    @media(max-width:720px) {
      #game-screen { height:auto; min-height:100vh; }
      .boards-wrap { flex-direction:column; }
      .task-grid   { grid-template-columns:repeat(4,1fr); }
    }
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>

<!-- ===== PICK SCREEN ===== -->
<div id="pick-screen" class="screen active">
  <div class="pick-title">🗺️ מפת ההפתעות של פורים 🎭</div>
  <div class="pick-sub">מי אתה/את? בחר/י את השם שלך</div>
  <div id="player-btns" class="pick-btns"></div>
  <div id="pick-error"></div>
</div>

<!-- ===== WAIT SCREEN ===== -->
<div id="wait-screen" class="screen">
  <div class="wait-ic">⏳</div>
  <div class="wait-title" id="wait-msg">ממתין שהמשחק יתחיל...</div>
  <div class="wait-sub">המורה יפעיל את המשחק בקרוב</div>
</div>

<!-- ===== GAME SCREEN ===== -->
<div id="game-screen" class="screen">
  <div class="gm-header">
    <div class="gm-title">🗺️ מפת ההפתעות של פורים 🎭</div>
    <div class="gm-meta">
      <div class="player-badge">
        <span class="player-lbl">תורו של:</span>
        <span class="player-name" id="cur-name">—</span>
        <span class="zone-tag"    id="cur-zone">—</span>
      </div>
      <div class="allowed-wrap" id="allowed-wrap"></div>
      <span class="my-badge" id="my-badge"></span>
    </div>
    <div class="phase-hint" id="phase-hint"></div>
  </div>

  <div class="boards-wrap">
    <div class="task-board">
      <div class="board-lbl lbl-tasks">🎯 לוח המשימות (25)</div>
      <div class="task-grid" id="task-grid"></div>
    </div>
    <div class="names-board">
      <div class="board-lbl lbl-names" style="flex-shrink:0">🗺️ לוח השמות</div>
      <div id="pile-A">
        <div class="pile-header ph-A"></div>
        <div class="pile-cards"></div>
      </div>
      <div id="pile-B">
        <div class="pile-header ph-B"></div>
        <div class="pile-cards"></div>
      </div>
      <div id="pile-mixed">
        <div class="pile-header ph-mixed"></div>
        <div class="pile-cards"></div>
      </div>
    </div>
  </div>
</div>

<!-- ===== GAMEOVER ===== -->
<div id="gameover-screen" class="screen">
  <div class="go-title">🎉 חג פורים שמח! 🎉</div>
  <div class="go-sub">✨ כל המשלוחים חולקו! ✨</div>
  <div class="sum-panel">
    <h3>📋 סיכום המשלוחים</h3>
    <div id="sum-list"></div>
  </div>
</div>

<!-- ===== TASK MODAL ===== -->
<div id="task-modal" class="modal-bg">
  <div class="modal-box">
    <span class="m-big-ic" id="tm-ic">🎭</span>
    <div class="m-num"  id="tm-num"></div>
    <div class="m-head">🎯 המשימה שלך:</div>
    <div class="m-task-txt" id="tm-txt"></div>
    <button class="m-btn btn-grn" onclick="onTaskDone()">✅ ביצעתי את המשימה!</button>
  </div>
</div>

<!-- ===== NAME MODAL ===== -->
<div id="name-modal" class="modal-bg">
  <div class="modal-box">
    <span class="m-big-ic" id="nm-ic">🎁</span>
    <div class="m-head">חשפת את השם!</div>
    <div class="m-name"     id="nm-name"></div>
    <div class="m-zone-tag" id="nm-zone"></div>
    <div class="m-announce" id="nm-ann"></div>
    <div class="m-next"     id="nm-next"></div>
    <button class="m-btn btn-gold" onclick="onNextPlayer()">לילד הבא ➡</button>
  </div>
</div>

<script>
/* ===== FIREBASE ===== */
firebase.initializeApp({
  apiKey:"AIzaSyCg4ma1a9ZzoXSRwqnWDmlsFqEYFhaIXSg",
  authDomain:"purim-116eb.firebaseapp.com",
  databaseURL:"https://purim-116eb-default-rtdb.firebaseio.com",
  projectId:"purim-116eb",
  storageBucket:"purim-116eb.firebasestorage.app",
  messagingSenderId:"818321822822",
  appId:"1:818321822822:web:9bdcdb131fdf21a63409a7"
});
const db = firebase.database();

/* ===== CONSTANTS ===== */
const T_ICONS = ['🎭','🎶','🥐','👑','🤡','📜','🍷','💰','🏛️','🐴','🌸','⭐','🎪','🃏','🎨','🎬','🎤','🪗','🥁','🎺','🪅','🎯','🔮','🌟','🎠'];

const ZONE_META = {
  A:     { emoji:'🔴', cardClass:'n-card-A',     badgeClass:'pb-A',     tagClass:'zt-A',     mztClass:'mzt-A',     srBadge:'sr-badge-A'     },
  B:     { emoji:'🟢', cardClass:'n-card-B',     badgeClass:'pb-B',     tagClass:'zt-B',     mztClass:'mzt-B',     srBadge:'sr-badge-B'     },
  mixed: { emoji:'🥇', cardClass:'n-card-mixed', badgeClass:'pb-mixed', tagClass:'zt-mixed', mztClass:'mzt-mixed', srBadge:'sr-badge-mixed' },
};

function getAllowedZones(zone) {
  if (zone === 'A') return ['A'];
  if (zone === 'B') return ['B'];
  return ['A','B','mixed'];
}

/* ===== STATE ===== */
let myName  = null;
let CONFIG  = null;
let G       = null;
let _pendingTask = null; // local only, before Firebase write

/* ===== HELPERS ===== */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function toArr(v) {
  if (!v) return [];
  if (Array.isArray(v)) return v;
  return Object.entries(v).sort(([a],[b]) => Number(a)-Number(b)).map(([,x])=>x);
}

function stateToG(state) {
  return {
    players:    toArr(CONFIG.players),
    tasks:      toArr(CONFIG.tasks).map((text,i) => ({ icon:T_ICONS[i], text })),
    zoneLabels: CONFIG.zoneLabels || { A:"אזור א'", B:"אזור ב'", mixed:'משולב' },
    piles: {
      A:     toArr(state.piles?.A),
      B:     toArr(state.piles?.B),
      mixed: toArr(state.piles?.mixed),
    },
    curPlayer:  state.curPlayer,
    played:     new Set(Object.keys(state.played || {})),
    nextPlayer: state.nextPlayer || null,
    phase:      state.phase,
    selTask:    (state.selTask === -1 || state.selTask == null) ? null : state.selTask,
    usedTasks:  new Set(Object.keys(state.usedTasks || {}).map(Number)),
    results:    toArr(state.results),
  };
}

/* ===== INIT ===== */
async function init() {
  try {
    const snap = await db.ref('purim/mapConfig').get();
    CONFIG = snap.val();
    if (!CONFIG?.players?.length && !Array.isArray(CONFIG?.players)) {
      document.getElementById('pick-error').textContent = '⚠️ אין הגדרות משחק. בקש/י מהמורה להפעיל את המשחק.';
      return;
    }
    // Auto-select player from URL param (used by admin "שחק בשמו/ה")
    const autoName = new URLSearchParams(location.search).get('as');
    if (autoName && toArr(CONFIG.players).some(p => p.name === autoName)) {
      selectPlayer(autoName);
      return;
    }
    buildPickScreen();
  } catch(e) {
    document.getElementById('pick-error').textContent = '⚠️ שגיאה בטעינה. בדוק/י חיבור לאינטרנט.';
  }
}

function buildPickScreen() {
  const cont = document.getElementById('player-btns');
  cont.innerHTML = '';
  toArr(CONFIG.players).forEach(p => {
    const btn = document.createElement('button');
    btn.className = `pick-btn pick-${p.zone}`;
    btn.textContent = p.name;
    btn.onclick = () => selectPlayer(p.name);
    cont.appendChild(btn);
  });
}

function selectPlayer(name) {
  myName = name;
  showScreen('game-screen');
  setupRealtime();
}

/* ===== REALTIME ===== */
function setupRealtime() {
  db.ref('purim/mapState').on('value', snap => {
    const state = snap.val();

    if (!state || state.status === 'idle') {
      showScreen('wait-screen');
      return;
    }
    G = stateToG(state);
    if (state.status === 'gameover') { showGameOver(); return; }
    showScreen('game-screen');
    renderGame();
  });
}

/* ===== RENDER ===== */
function renderGame() {
  const cp      = G.players.find(p => p.name === G.curPlayer);
  if (!cp) return;
  const allowed = getAllowedZones(cp.zone);
  const zm      = ZONE_META[cp.zone];
  const isMe    = myName === G.curPlayer;

  // Header
  document.getElementById('cur-name').textContent = cp.name;
  const ztEl = document.getElementById('cur-zone');
  ztEl.textContent = `${zm.emoji} ${G.zoneLabels[cp.zone]}`;
  ztEl.className   = `zone-tag ${zm.tagClass}`;

  document.getElementById('my-badge').textContent = `אתה: ${myName}`;

  document.getElementById('allowed-wrap').innerHTML =
    '<span style="color:#A5B4FC;font-size:.82rem">מותר לבחור מ:</span> ' +
    allowed.map(z => `<span class="pil-badge ${ZONE_META[z].badgeClass}">${ZONE_META[z].emoji} ${G.zoneLabels[z]}</span>`).join(' ');

  if (isMe) {
    document.getElementById('phase-hint').textContent = G.phase === 'task'
      ? 'שלב 1: בחר/י משימה מלוח המשימות ←'
      : 'שלב 2: בחר/י שם מהערימה המותרת לך →';
  } else {
    document.getElementById('phase-hint').textContent =
      G.phase === 'task'
        ? `ממתין/ה ל-${G.curPlayer} לבחור משימה...`
        : `ממתין/ה ל-${G.curPlayer} לבחור שם...`;
  }

  // Task grid
  const tg = document.getElementById('task-grid');
  tg.innerHTML = '';
  for (let i = 0; i < 25; i++) {
    const used   = G.usedTasks.has(i);
    const active = isMe && G.phase === 'task' && !used;
    const el = document.createElement('div');
    el.className = 't-sq ' + (used ? 'gone' : active ? 'can-pick' : 'no-pick');
    el.innerHTML = `<span class="sq-num">${i+1}</span><span class="sq-e">${G.tasks[i].icon}</span>`;
    if (active) el.onclick = () => pickTask(i);
    tg.appendChild(el);
  }

  // Name piles
  renderPiles(allowed, isMe);
}

function renderPiles(allowed, isMe) {
  for (const zone of ['A','B','mixed']) {
    const pile = G.piles[zone];
    const grp  = document.getElementById('pile-'+zone);
    if (!pile || pile.length === 0) { grp.style.display = 'none'; continue; }
    grp.style.display = 'block';

    const isAllowed = isMe && G.phase === 'name' && allowed.includes(zone);
    const hasActive = pile.some(c => !c.used);
    grp.className = 'pile-group ' + (isAllowed && hasActive ? 'pile-on' : 'pile-off');

    const remaining = pile.filter(c => !c.used).length;
    grp.querySelector('.pile-header').textContent =
      `${ZONE_META[zone].emoji} ${G.zoneLabels[zone]}  (${remaining}/${pile.length})`;

    const cardsDiv = grp.querySelector('.pile-cards');
    cardsDiv.innerHTML = '';
    pile.forEach((card, idx) => {
      const el = document.createElement('div');
      const canClick = isAllowed && !card.used;
      el.className = `n-card ${ZONE_META[zone].cardClass} ${card.used ? 'gone' : ''} ${canClick ? 'pickable' : ''}`;
      el.innerHTML  = `<span class="card-e">${ZONE_META[zone].emoji}</span><span class="card-n">${idx+1}</span>`;
      if (canClick) el.onclick = () => pickName(zone, idx);
      cardsDiv.appendChild(el);
    });
  }
}

/* ===== ACTIONS ===== */
function pickTask(idx) {
  _pendingTask = idx;
  document.getElementById('tm-ic').textContent  = G.tasks[idx].icon;
  document.getElementById('tm-num').textContent = `משימה מספר ${idx+1}`;
  document.getElementById('tm-txt').textContent = G.tasks[idx].text;
  openModal('task-modal');
}

async function onTaskDone() {
  closeModal('task-modal');
  const idx = _pendingTask;
  _pendingTask = null;
  await db.ref('purim/mapState').update({
    phase: 'name',
    selTask: idx,
    [`usedTasks/${idx}`]: true,
  });
}

async function pickName(pile, cardIdx) {
  const cp      = G.players.find(p => p.name === G.curPlayer);
  const allowed = getAllowedZones(cp.zone);
  const updates = {};

  let assignedTo   = G.piles[pile][cardIdx].name;
  let assignedPile = pile;

  // Self-pick fix
  if (assignedTo === cp.name) {
    const prevIdx = G.results.findIndex(r => r.to !== cp.name && allowed.includes(r.pile));
    if (prevIdx !== -1) {
      const prev = G.results[prevIdx];
      updates[`piles/${pile}/${cardIdx}/name`]           = prev.to;
      updates[`piles/${prev.pile}/${prev.pileIdx}/name`] = cp.name;
      updates[`results/${prevIdx}/to`]                   = cp.name;
      assignedTo = prev.to;
    } else {
      let swapped = false;
      for (const p of allowed) {
        const ai = G.piles[p].findIndex((c,i) => !c.used && c.name !== cp.name && !(p===pile && i===cardIdx));
        if (ai !== -1) {
          updates[`piles/${pile}/${cardIdx}/name`] = G.piles[p][ai].name;
          updates[`piles/${p}/${ai}/name`]         = cp.name;
          assignedTo = G.piles[p][ai].name;
          swapped = true;
          break;
        }
      }
      if (!swapped) {
        for (const p of ['A','B','mixed']) {
          const ai = G.piles[p].findIndex((c,i) => !c.used && c.name !== cp.name && !(p===pile && i===cardIdx));
          if (ai !== -1) {
            updates[`piles/${pile}/${cardIdx}/name`] = G.piles[p][ai].name;
            updates[`piles/${p}/${ai}/name`]         = cp.name;
            assignedTo = G.piles[p][ai].name;
            break;
          }
        }
      }
    }
  }

  updates[`piles/${pile}/${cardIdx}/used`] = true;
  updates[`results/${G.results.length}`]   = {
    player: cp.name, playerZone: cp.zone,
    to: assignedTo, pile: assignedPile, pileIdx: cardIdx, taskIdx: G.selTask,
  };

  const playedAfterThis = new Set([...G.played, cp.name]);
  const nextP = !playedAfterThis.has(assignedTo)
    ? assignedTo
    : (G.players.find(p => !playedAfterThis.has(p.name))?.name ?? '');
  updates['nextPlayer'] = nextP;

  await db.ref('purim/mapState').update(updates);

  // Open modal (local only)
  const toPlayer   = G.players.find(p => p.name === assignedTo);
  const toZone     = toPlayer?.zone ?? 'mixed';
  const toZoneMeta = ZONE_META[toZone];
  document.getElementById('nm-ic').textContent   = toZoneMeta.emoji;
  document.getElementById('nm-name').textContent = assignedTo || '???';
  const nmZone = document.getElementById('nm-zone');
  nmZone.textContent = `${toZoneMeta.emoji} ${G.zoneLabels[toZone]}`;
  nmZone.className   = `m-zone-tag ${toZoneMeta.mztClass}`;
  document.getElementById('nm-ann').textContent  =
    `"${assignedTo}, אני הגמד שלך! 🎭\nאני אשלח לך משלוח מנות לפורים!" 🍪🍬`;

  const nextEl = document.getElementById('nm-next');
  if (nextP && playedAfterThis.size < G.players.length) {
    nextEl.textContent   = `הבא/ה בתור: ${nextP} 🎭`;
    nextEl.style.display = 'block';
  } else {
    nextEl.style.display = 'none';
  }

  openModal('name-modal');
  spawnConfetti(45);
}

async function onNextPlayer() {
  closeModal('name-modal');
  document.getElementById('nm-next').style.display = 'none';

  const newPlayed = new Set([...G.played, G.curPlayer]);
  const updates   = { [`played/${G.curPlayer}`]: true, phase:'task', selTask:-1, nextPlayer:'' };

  if (newPlayed.size >= G.players.length) {
    updates.status = 'gameover';
  } else {
    updates.curPlayer = G.nextPlayer;
  }
  await db.ref('purim/mapState').update(updates);
}

/* ===== GAMEOVER ===== */
function showGameOver() {
  showScreen('gameover-screen');
  const list = document.getElementById('sum-list');
  list.innerHTML = G.results.map(r => {
    const ic    = G.tasks[r.taskIdx]?.icon || '🎯';
    const fZone = ZONE_META[r.playerZone];
    const toP   = G.players.find(p => p.name === r.to);
    const tZone = ZONE_META[toP?.zone ?? 'mixed'];
    return `<div class="sum-row">
      <span style="font-size:1.1rem">${ic}</span>
      <span class="sr-badge ${fZone.srBadge}">${fZone.emoji}</span>
      <span class="sr-frm">${r.player}</span>
      <span class="sr-arr">→ גמד/ה שלו/ה:</span>
      <span class="sr-badge ${tZone.srBadge}">${tZone.emoji}</span>
      <span class="sr-to">${r.to}</span>
    </div>`;
  }).join('');
  spawnConfetti(130);
}

/* ===== CONFETTI ===== */
function spawnConfetti(n) {
  const colors = ['#F59E0B','#A855F7','#10B981','#EF4444','#3B82F6','#F87171','#34D399','#FBBF24'];
  for (let i = 0; i < n; i++) {
    const el = document.createElement('div');
    const sz = Math.random()*11+6;
    el.style.cssText = `position:fixed;left:${Math.random()*100}vw;top:-${sz+2}px;
      width:${sz}px;height:${sz}px;background:${colors[Math.floor(Math.random()*colors.length)]};
      border-radius:${Math.random()>.5?'50%':'3px'};z-index:9999;pointer-events:none;
      animation:cfDrop ${1.6+Math.random()*2}s ${Math.random()*1.2}s linear forwards;`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4200);
  }
}

/* ===== START ===== */
init();
</script>
